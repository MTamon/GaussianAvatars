name: gaussian-avatars
# -------------------------------------------------------------------------
# Python 3.11 + PyTorch 2.9.1 + CUDA 12.8 environment for GaussianAvatars.
# -------------------------------------------------------------------------
# Pin set aligned with the companion MTamon "cuda128" branches:
#   - https://github.com/MTamon/DECA      (release/cuda128, install_128.sh)
#   - https://github.com/MTamon/HRAvatar  (release/cuda128, setup.sh)
#   - https://github.com/MTamon/FlashAvatar (release/cuda128-fixed)
#
# All Python packages are installed via setup.sh (ordered, --no-deps) so they
# are not repeated in environment.yml. This keeps the conda resolver from
# re-pinning anything.
# -------------------------------------------------------------------------
channels:
  - pytorch
  - nvidia/label/cuda-12.8.0
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip=25.2
  - ninja
  - cmake
  - gcc_linux-64=11
  - gxx_linux-64=11
  - cuda-toolkit=12.8
  - ffmpeg>=6.0
